spring:
  application:
    name: couplespace-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:couplespace}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET:MyVeryLongSecretKeyForJWTSigningThatIsAtLeast512BitsLong12345678901234567890123456789012}
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-ms: 2592000000  # 30 days

openai:
  # ⬇️  PASTE YOUR API KEY HERE for local testing (replace the text below)
  api-key: ${OPENAI_API_KEY:sk-PASTE-YOUR-KEY-HERE}
  model: ${OPENAI_MODEL:gpt-4o-mini}   # cheapest model — ~$0.0002 per call
  max-tokens: 600                        # kept small to reduce cost
  base-url: https://api.openai.com/v1

aws:
  s3:
    bucket: ${S3_BUCKET:couplespace-media}
    region: ${AWS_REGION:ap-south-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

logging:
  level:
    com.couplespace: DEBUG
    org.springframework.websocket: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
