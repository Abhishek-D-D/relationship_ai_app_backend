spring:
  application:
    name: couplespace-backend

  datasource:
    url: jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:couplespace}}
    username: ${PGUSER:${DB_USER:postgres}}
    password: ${PGPASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # Increase multipart limits for media uploads (images, voice notes, videos)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1


jwt:
  secret: ${JWT_SECRET:MyVeryLongSecretKeyForJWTSigningThatIsAtLeast512BitsLong12345678901234567890123456789012}
  access-token-expiry-ms: 604800000      # 7 days
  refresh-token-expiry-ms: 2592000000  # 30 days

openai:
  api-key: ${OPENAI_API_KEY:sk-PASTE-YOUR-KEY-HERE}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  max-tokens: 600
  base-url: https://api.openai.com/v1

# ─── Cloudinary Media Storage ────────────────────────────────────────────────
# On Railway: add env vars CLOUDINARY_CLOUD_NAME and CLOUDINARY_UPLOAD_PRESET
# Create a FREE account at cloudinary.com → Settings → Upload → Add upload preset
# Set the preset to "Unsigned" mode
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  upload-preset: ${CLOUDINARY_UPLOAD_PRESET:ml_default}

logging:
  level:
    com.couplespace: DEBUG
    org.springframework.websocket: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: ${APP_BASE_URL:https://relationshipaiappbackend-production.up.railway.app}
